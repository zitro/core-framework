name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish (e.g., v0.1.0)"
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Gate: re-run the test suite on the exact tagged commit before publishing.
  test:
    name: Test (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        suite: [backend, frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - if: matrix.suite == 'backend'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - if: matrix.suite == 'backend'
        working-directory: backend
        run: |
          pip install -e ".[dev,local]"
          ruff check .
          ruff format --check .
          pytest tests/ -v --tb=short
        env:
          LLM_PROVIDER: local
          STORAGE_PROVIDER: local
          AUTH_PROVIDER: none

      - if: matrix.suite == 'frontend'
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
        with:
          version: 10

      - if: matrix.suite == 'frontend'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - if: matrix.suite == 'frontend'
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          npx tsc --noEmit
          npx vitest run
          pnpm build

      # Schema drift gate introspects Pydantic models, so the frontend
      # suite also needs Python + the backend package installed.
      - if: matrix.suite == 'frontend'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
          cache: pip

      - if: matrix.suite == 'frontend'
        working-directory: backend
        run: pip install -e ".[dev,local]"

      - name: Schema-artifact drift (frontend suite only)
        if: matrix.suite == 'frontend'
        run: pnpm check:schemas

      - name: CLI tests (frontend suite only)
        if: matrix.suite == 'frontend'
        run: pnpm --filter create-core-discovery-app test

  # Per-(component × arch) matrix on native runners. No QEMU. Each cell
  # pushes by digest, smoke-tests the image on its native arch, and
  # exports its digest. The manifest job assembles the multi-arch tag
  # and handles signing / attestation / scanning at the manifest level.
  build-and-push:
    name: Build ${{ matrix.component }} (${{ matrix.arch }})
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend]
        arch: [amd64, arm64]
        include:
          - component: frontend
            image: core-framework-frontend
            context: .
            dockerfile: Dockerfile
          - component: backend
            image: core-framework-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - arch: amd64
            runs-on: ubuntu-24.04
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    outputs:
      frontend-amd64-digest: ${{ steps.export.outputs.frontend-amd64-digest }}
      frontend-arm64-digest: ${{ steps.export.outputs.frontend-arm64-digest }}
      backend-amd64-digest: ${{ steps.export.outputs.backend-amd64-digest }}
      backend-arm64-digest: ${{ steps.export.outputs.backend-arm64-digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/${{ matrix.arch }}
          push: true
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }},mode=max
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }},push-by-digest=true,name-canonical=true
          provenance: false

      - name: Smoke-test backend image (native ${{ matrix.arch }})
        if: matrix.component == 'backend'
        run: |
          set -euo pipefail
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}@${{ steps.build.outputs.digest }} \
            python -c "import pydantic_core, cryptography, pymupdf, aiohttp; print('backend smoke ok')"

      - name: Smoke-test frontend image (native ${{ matrix.arch }})
        if: matrix.component == 'frontend'
        run: |
          set -euo pipefail
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}@${{ steps.build.outputs.digest }} \
            node -e "require('next'); console.log('frontend smoke ok')"

      - name: Export digest
        id: export
        run: |
          set -euo pipefail
          echo "${{ matrix.component }}-${{ matrix.arch }}-digest=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  # Assemble the multi-arch tag, sign + attest + scan at the manifest
  # level. Consumers verify via tag, which resolves to the index digest.
  manifest:
    name: Assemble + sign ${{ matrix.image }} multi-arch manifest
    needs: build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: frontend
            image: core-framework-frontend
          - component: backend
            image: core-framework-backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          flavor: |
            latest=${{ steps.version.outputs.is_prerelease == 'false' }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.tag }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=CORE Discovery ${{ matrix.component }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=CORE Discovery contributors

      - name: Create and push multi-arch manifest
        id: manifest
        run: |
          set -euo pipefail
          # Resolve per-arch digests from the build-and-push outputs.
          # Explicit per-component dispatch is unambiguous and survives
          # matrix/output renames without silent fallback.
          if [ "${{ matrix.component }}" = "frontend" ]; then
            AMD64_DIGEST="${{ needs.build-and-push.outputs.frontend-amd64-digest }}"
            ARM64_DIGEST="${{ needs.build-and-push.outputs.frontend-arm64-digest }}"
          else
            AMD64_DIGEST="${{ needs.build-and-push.outputs.backend-amd64-digest }}"
            ARM64_DIGEST="${{ needs.build-and-push.outputs.backend-arm64-digest }}"
          fi
          if [ -z "$AMD64_DIGEST" ] || [ -z "$ARM64_DIGEST" ]; then
            echo "Missing per-arch digest for ${{ matrix.component }} (amd64=$AMD64_DIGEST arm64=$ARM64_DIGEST)" >&2
            exit 1
          fi
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}"
          TAG_ARGS=""
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            TAG_ARGS="$TAG_ARGS -t $tag"
          done <<EOF
          ${{ steps.meta.outputs.tags }}
          EOF
          docker buildx imagetools create $TAG_ARGS \
            "${IMAGE}@${AMD64_DIGEST}" \
            "${IMAGE}@${ARM64_DIGEST}"
          # The manifest digest is the SHA-256 of the serialized index
          # JSON bytes the registry returns. Compute it directly from
          # --raw so we never depend on buildx's --format template
          # selecting the index vs a per-arch entry.
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          MANIFEST_DIGEST="sha256:$(docker buildx imagetools inspect --raw "$PRIMARY_TAG" | sha256sum | cut -d' ' -f1)"
          echo "manifest-digest=${MANIFEST_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "primary-tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign manifest (keyless, OIDC)
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.manifest.outputs.manifest-digest }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          subject-digest: ${{ steps.manifest.outputs.manifest-digest }}
          push-to-registry: true

      - name: Vulnerability scan (Trivy)
        id: trivy
        continue-on-error: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}@${{ steps.manifest.outputs.manifest-digest }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy results to Security tab
        if: steps.trivy.outcome == 'success' && hashFiles(format('trivy-{0}.sarif', matrix.component)) != ''
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4 # v3.35.4
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: manifest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect prerelease
        id: pre
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-* ]]; then echo "prerelease=true" >> "$GITHUB_OUTPUT"; else echo "prerelease=false" >> "$GITHUB_OUTPUT"; fi

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          prerelease: ${{ steps.pre.outputs.prerelease }}
          body: |
            Container images published to GHCR (multi-arch: amd64, arm64):

            - `ghcr.io/${{ github.repository_owner }}/core-framework-frontend:${{ github.ref_name }}`
            - `ghcr.io/${{ github.repository_owner }}/core-framework-backend:${{ github.ref_name }}`

            Pull:

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/core-framework-frontend:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository_owner }}/core-framework-backend:${{ github.ref_name }}
            ```

            Inspect the multi-arch manifest:

            ```bash
            docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/core-framework-backend:${{ github.ref_name }}
            ```

            Verify signature (Cosign keyless, manifest-level):

            ```bash
            cosign verify \
              --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ghcr.io/${{ github.repository_owner }}/core-framework-frontend:${{ github.ref_name }}
            ```

            Verify build provenance:

            ```bash
            gh attestation verify oci://ghcr.io/${{ github.repository_owner }}/core-framework-frontend:${{ github.ref_name }} \
              --repo ${{ github.repository }}
            ```
